model_list:
  - model_name: budget
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: balanced
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: top
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  # Add OpenAI / Gemini aliases here as needed, e.g.:
  # - model_name: openai-balanced
  #   litellm_params:
  #     model: openai/gpt-5.4
  #     api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  drop_params: true
