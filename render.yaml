services:
  - type: web
    name: litellm-proxy
    runtime: docker
    plan: free            # free tier for testing; bump to "starter" for a real client (no idle spin-down)
    envVars:
      - key: PORT
        value: 4000
      - key: LITELLM_MASTER_KEY
        sync: false          # prompts in the Render UI — the single key the app sends
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
